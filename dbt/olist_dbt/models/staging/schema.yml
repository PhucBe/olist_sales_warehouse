version: 2

models:
  - name: stg_orders
    description: "Staging model for Olist orders. Standardizes order-level attributes and timestamps."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - created
                  - approved
                  - invoiced
                  - processing
                  - shipped
                  - delivered
                  - unavailable
                  - canceled

      - name: order_purchase_ts
        tests:
          - not_null

  - name: stg_order_items
    description: "Staging model for Olist order items. Represents line items before core fact modeling."
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id

      - name: order_item_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

      - name: seller_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_sellers')
                field: seller_id

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - order_item_id

  - name: stg_customers
    description: "Staging model for Olist customers."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: customer_unique_id
        tests:
          - not_null

  - name: stg_products
    description: "Staging model for Olist products with translated category when available."
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: stg_sellers
    description: "Staging model for Olist sellers."
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: stg_payments
    description: "Staging model for order payments at order grain."
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id

  - name: stg_reviews
    description: "Staging model for order reviews."
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id

  - name: stg_product_category_translation
    description: "Mapping model for Portuguese to English product category names."
    columns:
      - name: product_category_name
        tests:
          - not_null
          - unique

      - name: product_category_name_english
        tests:
          - not_null