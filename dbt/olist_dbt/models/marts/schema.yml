version: 2

models:
  - name: mart_daily_sales
    description: "Daily sales mart for top-level revenue and order monitoring."
    columns:
      - name: order_date_key
        tests:
          - not_null
          - unique

  - name: mart_product_performance
    description: "Mart for product and category performance analysis."
    columns:
      - name: product_id
        tests:
          - not_null

      - name: product_key
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_key

  - name: mart_customer_360
    description: "Customer mart used for repeat customer and customer lifetime analysis."
    columns:
      - name: customer_unique_id
        tests:
          - not_null
          - unique

      - name: total_orders
        tests:
          - not_null

      - name: first_order_date
        tests:
          - not_null

      - name: last_order_date
        tests:
          - not_null

      - name: lifetime_value
        tests:
          - not_null

  - name: mart_seller_performance
    description: "Seller performance mart for revenue, order volume and activity analysis."
    columns:
      - name: seller_key
        tests:
          - not_null
          - unique

      - name: seller_id
        tests:
          - not_null